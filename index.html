<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <nav class="nav">
            <p class="ps" onclick=bgc()>Home</p>
            <p class="ps" onclick=ab()>About</p>
            <p class="ps" onclick=cd()>Services</p>
            <p class="ps" onclick=ef()>Resume</p>
            <p class="ps" onclick=gh()>Potfolio</p>
            <p class="ps" onclick=ij()>Contact</p>
        </nav>
    </div>
</body>
<script>
    function bgc(){document.body.style.backgroundColor = "red";}
    function ab(){document.body.style.backgroundColor = "blue";}
    function cd(){document.body.style.backgroundColor = "purple";}
    function ef(){document.body.style.backgroundColor = "orange";}
    function gh(){document.body.style.backgroundColor = "pink";}
    function ij(){document.body.style.backgroundColor = "limegreen";}
</script>
</html>
